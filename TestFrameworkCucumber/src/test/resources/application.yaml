app:
  services:
    kanban-service:
      gateway: http://localhost:8080/api
      db:
        url: jdbc:postgresql://localhost:5432/kanban
        username: kanban
        password: kanban
        driver-class-name: org.postgresql.Driver
        schema: public

    user-service:
      gateway: http://localhost:8081/api
      db:
        url: jdbc:postgresql://localhost:5432/users
        username: user_service_user
        password: user_service_pass
        driver-class-name: org.postgresql.Driver
        schema: public

    notification-service:
      gateway: http://localhost:8082/api

logging:
  level:
    com.myakushev: DEBUG
    org.springframework: INFO