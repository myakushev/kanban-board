<div class="page-container">
  <div class="page-title">
    <h1>{{kanban?.title}}</h1>
  </div>
  <div class="button-group">
    <button mat-raised-button (click)="openDialogForNewTask()">+ Create Task</button>
    <button mat-raised-button
            color="accent"
            (click)="loadSystemTasks()"
            [disabled]="isLoadingSystemTasks">
      {{ isLoadingSystemTasks ? 'Loading...' : '📥 Load System Tasks' }}
    </button>
  </div>
  <div class="kanban-board">
    <div class="list-container">
      <h2 data-testid="aasdasd">To do</h2>
      <div
        cdkDropList
        id="todo"
        [cdkDropListData]="todos"
        [cdkDropListConnectedTo]="['inpro', 'done']"
        class="board-list"
        (cdkDropListDropped)="drop($event)">
        <div class="sticky-note" *ngFor="let task of todos" cdkDrag
             [style.background-color]="task.color"
             (dblclick)="openTaskDialog($event)"
             id="{{task.id}}">
          <div class="task-title">{{task.title}}</div>
          <div class="task-actions">
            <!-- НОВАЯ КНОПКА: Сделать системной (только если ещё не системная) -->
            <button *ngIf="!task.systemTask"
                    class="system-task-btn"
                    (click)="$event.stopPropagation(); promoteToSystemTask(task.id, $event)"
                    title="Make system task">
              🔗
            </button>
            <!-- Индикатор системной задачи -->
            <span *ngIf="task.systemTask" class="system-badge" title="System task">
              🔄
            </span>
          </div>
        </div>
      </div>
    </div>

    <div class="list-container">
      <h2>In Progress</h2>
      <div
        cdkDropList
        id="inpro"
        [cdkDropListData]="inprogress"
        [cdkDropListConnectedTo]="['todo', 'done']"
        class="board-list"
        (cdkDropListDropped)="drop($event)">
        <div class="sticky-note" *ngFor="let task of inprogress" cdkDrag
             [style.background-color]="task.color"
             (dblclick)="openTaskDialog($event)"
             id="{{task.id}}">
          <div class="task-title">{{task.title}}</div>
          <div class="task-actions">
            <button *ngIf="!task.systemTask"
                    class="system-task-btn"
                    (click)="$event.stopPropagation(); promoteToSystemTask(task.id, $event)"
                    title="Make system task">
              🔗
            </button>
            <span *ngIf="task.systemTask" class="system-badge" title="System task">
              🔄
            </span>
          </div>
        </div>
      </div>
    </div>

    <div class="list-container">
      <h2>Done</h2>
      <div
        cdkDropList
        id="done"
        [cdkDropListData]="dones"
        [cdkDropListConnectedTo]="['todo', 'inpro']"
        class="board-list"
        (cdkDropListDropped)="drop($event)">
        <div class="sticky-note" *ngFor="let task of dones" cdkDrag
             [style.background-color]="task.color"
             (dblclick)="openTaskDialog($event)"
             id="{{task.id}}">
          <div class="task-title">{{task.title}}</div>
          <div class="task-actions">
            <button *ngIf="!task.systemTask"
                    class="system-task-btn"
                    (click)="$event.stopPropagation(); promoteToSystemTask(task.id, $event)"
                    title="Make system task">
              🔗
            </button>
            <span *ngIf="task.systemTask" class="system-badge" title="System task">
                🔄
              </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
